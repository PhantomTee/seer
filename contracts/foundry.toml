[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "prague"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "../.env.local" }, { access = "read-write", path = ".env.local" }]

[rpc_endpoints]
arc_testnet = "${NEXT_PUBLIC_ARC_RPC_URL}"

[etherscan]
arc_testnet = { key = "placeholder", url = "https://testnet.arcscan.app/api" }

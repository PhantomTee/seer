name: Agent — Auto-Resolve Markets

on:
  schedule:
    # Every 5 minutes — checks CHAINLINK markets past resolution time
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual'

jobs:
  resolve:
    name: Trigger market resolution
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call resolve endpoint
        run: |
          STATUS=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/agent/resolve" \
            -H "Authorization: Bearer ${{ secrets.AGENT_CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/body.json
          echo "HTTP $STATUS"
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
